<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoManage Verification</title>
    <meta name="description" content="OAuth callback page for RoManage.">
    <link rel="icon" type="image/png" href="/RoManage-Website/assets/romanage-logo.png">
    <link rel="apple-touch-icon" href="/RoManage-Website/assets/romanage-logo.png">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <main class="shell callback-shell">
      <section class="panel callback-panel">
        <p class="eyebrow">Roblox verification</p>
        <h1 id="status-title">Finishing verification</h1>
        <p id="status-message">
          Sending your Roblox authorization back to RoManage.
        </p>
        <pre id="callback-data" aria-label="Callback details"></pre>
      </section>
    </main>

    <script>
      const workerCallback = "https://romanage-roblox-oauth.tahtpeep.workers.dev/roblox/callback";
      const params = new URLSearchParams(window.location.search);
      const title = document.getElementById("status-title");
      const message = document.getElementById("status-message");
      const data = document.getElementById("callback-data");

      const code = params.get("code");
      const state = params.get("state");
      const error = params.get("error");
      const errorDescription = params.get("error_description");

      if (error) {
        title.textContent = "Authorization failed";
        message.textContent = errorDescription || error;
        data.textContent = JSON.stringify({ error, errorDescription, state }, null, 2);
      } else if (code) {
        const target = new URL(workerCallback);
        for (const [key, value] of params.entries()) {
          target.searchParams.set(key, value);
        }
        window.location.replace(target.toString());
      } else {
        title.textContent = "No authorization code found";
        message.textContent = "Open this page from the Roblox OAuth redirect flow.";
        data.textContent = JSON.stringify({ state }, null, 2);
      }
    </script>
  </body>
</html>
